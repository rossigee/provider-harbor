apiVersion: scan.harbor.m.crossplane.io/v1beta1
kind: Scan
metadata:
  name: uptest-scan
  namespace: uptest
  annotations:
    meta.upbound.io/example-id: harbor/v1beta1/scan
    uptest.upbound.io/timeout: "600"   # Trivy DB download + scan can take minutes
spec:
  forProvider:
    projectId: uptest-images       # seeded by uptest-setup.sh
    repositoryName: busybox
    reference: latest
  providerConfigRef:
    kind: ProviderConfig
    name: harbor-e2e
