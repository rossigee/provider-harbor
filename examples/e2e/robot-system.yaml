apiVersion: harbor.m.crossplane.io/v1beta1
kind: Project
metadata:
  name: uptest-robot-sys-proj
  namespace: uptest
  annotations:
    meta.upbound.io/example-id: harbor/v1beta1/robot
spec:
  forProvider:
    name: uptest-robot-sys-proj
    public: false
  providerConfigRef:
    kind: ProviderConfig
    name: harbor-e2e
---
apiVersion: harbor.m.crossplane.io/v1beta1
kind: Robot
metadata:
  name: uptest-robot-system
  namespace: uptest
  annotations:
    meta.upbound.io/example-id: harbor/v1beta1/robot
spec:
  forProvider:
    name: uptest-robot-system
    # A system-level robot is cluster-wide; it is NOT scoped to a single
    # projectId. Each permission carries its own scope: kind=system (namespace
    # "/", cluster-wide) and/or kind=project naming a specific project.
    level: system
    permissions:
      # System-wide permission: manage robot accounts across Harbor.
      - kind: system
        scope: /
        namespace: robot
        access: ["create", "list"]
      # Project-scoped permission for a specific project (by name).
      - kind: project
        scope: uptest-robot-sys-proj
        namespace: repository
        access: ["pull", "push"]
  writeConnectionSecretToRef:
    name: uptest-robot-system-creds
  providerConfigRef:
    kind: ProviderConfig
    name: harbor-e2e
