# Phase 2 Example: Harbor Provider Resources
# This demonstrates how to use the Member resources
# from the Crossplane Harbor Provider

---
# Example 1: Create a Project (Phase 1 - for context)
apiVersion: project.harbor.m.crossplane.io/v1beta1
kind: Project
metadata:
  name: myproject
  namespace: default
spec:
  providerConfigRef:
    name: harbor-provider-config
  forProvider:
    name: my-docker-project
    public: false
    autoScanImages: true
    preventVulnerableImages: true
    severity: high

---
# Example 2: Add a Project Member (Phase 2)
apiVersion: member.harbor.m.crossplane.io/v1beta1
kind: Member
metadata:
  name: myproject-developer
  namespace: default
spec:
  providerConfigRef:
    name: harbor-provider-config
  forProvider:
    projectId: "1"
    username: john-developer
    role: developer
  # Roles: admin, master, developer, guest, maintainer

---
# Example 3: Another Member - Project Admin
apiVersion: member.harbor.m.crossplane.io/v1beta1
kind: Member
metadata:
  name: myproject-admin
  namespace: default
spec:
  providerConfigRef:
    name: harbor-provider-config
  forProvider:
    projectId: "1"
    username: jane-admin
    role: master

# Provider Config Reference
# This should be created before the above resources:
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: harbor-credentials
#   namespace: crossplane-system
# type: Opaque
# data:
#   username: <base64-encoded-username>
#   password: <base64-encoded-password>
#
# ---
# apiVersion: harbor.crossplane.io/v1beta1
# kind: ProviderConfig
# metadata:
#   name: harbor-provider-config
# spec:
#   credentials:
#     source: Secret
#     secretRef:
#       namespace: crossplane-system
#       name: harbor-credentials
#   endpoint: https://harbor.example.com

# Expected Status After Deployment:
#
# $ kubectl get members
# NAME                    READY   USERNAME        ROLE        AGE
# myproject-developer     True    john-developer  developer   20s
# myproject-admin         True    jane-admin      master      18s
