# Phase 2 Example: Harbor Provider Resources
# This demonstrates how to use the new Repository, Artifact, Member, and Scan resources
# from the Crossplane Harbor Provider

---
# Example 1: Create a Project (Phase 1 - for context)
apiVersion: project.harbor.m.crossplane.io/v1beta1
kind: Project
metadata:
  name: myproject
  namespace: default
spec:
  providerConfigRef:
    name: harbor-provider-config
  forProvider:
    name: my-docker-project
    public: false
    autoScanImages: true
    preventVulnerableImages: true
    severity: high

---
# Example 2: Create a Repository (Phase 2)
apiVersion: repository.harbor.m.crossplane.io/v1beta1
kind: Repository
metadata:
  name: myproject-myrepo
  namespace: default
spec:
  providerConfigRef:
    name: harbor-provider-config
  forProvider:
    projectId: "1"  # ID of the project from Example 1
    name: myrepo
    description: "My container repository"

---
# Example 3: Observe an Artifact (Phase 2)
apiVersion: artifact.harbor.m.crossplane.io/v1beta1
kind: Artifact
metadata:
  name: myapp-image
  namespace: default
spec:
  providerConfigRef:
    name: harbor-provider-config
  forProvider:
    projectId: "1"
    repositoryName: myrepo
    reference: "v1.0.0"
    type: image
  # Note: This resource is read-only (observes artifacts)
  # It does NOT create artifacts in Harbor - that happens through Docker push
  # Use this to monitor artifact status, vulnerabilities, and pull counts

---
# Example 4: Add a Project Member (Phase 2)
apiVersion: member.harbor.m.crossplane.io/v1beta1
kind: Member
metadata:
  name: myproject-developer
  namespace: default
spec:
  providerConfigRef:
    name: harbor-provider-config
  forProvider:
    projectId: "1"
    username: john-developer
    role: developer
  # Roles: admin, master, developer, guest, maintainer

---
# Example 5: Another Member - Project Admin
apiVersion: member.harbor.m.crossplane.io/v1beta1
kind: Member
metadata:
  name: myproject-admin
  namespace: default
spec:
  providerConfigRef:
    name: harbor-provider-config
  forProvider:
    projectId: "1"
    username: jane-admin
    role: master

---
# Example 6: Trigger a Vulnerability Scan (Phase 2)
apiVersion: scan.harbor.m.crossplane.io/v1beta1
kind: Scan
metadata:
  name: myapp-scan
  namespace: default
spec:
  providerConfigRef:
    name: harbor-provider-config
  forProvider:
    projectId: "1"
    repositoryName: myrepo
    reference: "v1.0.0"
  # Note: Creating this resource triggers a scan job in Harbor
  # The Status.AtProvider fields show the scan results

# Provider Config Reference
# This should be created before the above resources:
#
# apiVersion: v1
# kind: Secret
# metadata:
