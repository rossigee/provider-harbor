name: Release

# Why this workflow exists
# ------------------------
# The stock release.yml ran `make publish` with REGISTRY_ORGS (the runtime
# controller Docker image) and XPKG_REG_ORGS (the Crossplane package) pointing
# at the SAME ref: ghcr.io/<owner>/provider-harbor:<tag>. The two artifacts
# collide on that one tag and the plain runtime image wins. A consumer that
# does `kubectl apply` of a Provider referencing that tag therefore pulls the
# runtime image, whose /package/package.yaml contains ONLY the
# `meta.pkg.crossplane.io Provider` doc (the 15 CRDs sit as loose files under
# /package/crds/, which the Crossplane package runtime never reads). Result:
# the ProviderRevision goes Healthy but registers 0 CRDs, and every managed
# resource fails with `no matches for kind ...`.
#
# This workflow does it the right way, per architecture:
#   1. build the provider binary,
#   2. build the runtime controller image LOCALLY (not pushed to the provider ref),
#   3. `crossplane xpkg build` it into a real package (recurses package/ so the
#      CRDs are merged into package.yaml, with the runtime embedded),
#   4. VERIFY package.yaml actually contains the CRDs (the guard the stock
#      pipeline lacked),
# then push all per-arch xpkgs as a SINGLE multi-platform package index to
# ghcr.io/<owner>/provider-harbor:<tag>.
#
# This is the canonical release path; the old release.yml is disabled so it
# cannot race this workflow on the same tag. The controller code is unchanged —
# this fixes packaging only.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "OCI tag to publish (semver, e.g. v0.17.0)"
        required: true
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.26.4'
  CROSSPLANE_CLI_VERSION: 'v2.3.2'
  # Architectures published in the multi-platform package. Add/remove arches
  # here — every step that fans out over arch reads this list.
  PLATFORMS: 'amd64 arm64'

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Resolve version + lowercase owner
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF#refs/tags/}"
          else
            V="${{ inputs.version }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "Publishing version=$V for: ${PLATFORMS}"

      - name: Install Crossplane CLI
        run: |
          # The Crossplane CLI ("crank") is published on releases.crossplane.io,
          # not as a GitHub release asset.
          curl -fsSL \
            "https://releases.crossplane.io/stable/${CROSSPLANE_CLI_VERSION}/bin/linux_amd64/crank" \
            -o /usr/local/bin/crossplane
          chmod +x /usr/local/bin/crossplane
          crossplane --version || true

      - name: Set up QEMU (cross-arch runtime image builds)
        uses: docker/setup-qemu-action@v3

      - name: Build per-arch xpkgs (binary -> runtime image -> xpkg + CRD verify)
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          EXPECTED=$(ls package/crds/*.yaml | wc -l | tr -d ' ')
          XPKG_FILES=""

          for ARCH in ${PLATFORMS}; do
            echo "::group::build $ARCH"

            # 1. provider binary for this arch
            mkdir -p "bin/linux_${ARCH}"
            CGO_ENABLED=0 GOOS=linux GOARCH="${ARCH}" go build -trimpath \
              -o "bin/linux_${ARCH}/provider" ./cmd/provider
            file "bin/linux_${ARCH}/provider"

            # 2. runtime controller image LOCALLY (embedded into the xpkg; never
            #    pushed to the provider tag — that collision is the original bug).
            #    --platform + QEMU so the arm64 image is genuinely arm64.
            RUNTIME="provider-harbor-runtime:${VERSION}-${ARCH}"
            docker build \
              --platform "linux/${ARCH}" \
              --build-arg TARGETOS=linux \
              --build-arg TARGETARCH="${ARCH}" \
              -t "${RUNTIME}" \
              -f cluster/images/provider-harbor/Dockerfile \
              .

            # 3. xpkg: --package-root recurses package/ (crossplane.yaml +
            #    crds/*.yaml), merging all CRDs into the package's package.yaml.
            XPKG="provider-harbor-${ARCH}.xpkg"
            crossplane xpkg build \
              --package-root=package \
              --embed-runtime-image="${RUNTIME}" \
              --package-file="${XPKG}"
            ls -la "${XPKG}"

            # 4. hard gate: package.yaml must carry the Provider meta + all CRDs.
            rm -rf _verify && mkdir _verify
            tar -xf "${XPKG}" -C _verify
            PKG_YAML=""
            for blob in $(find _verify -type f); do
              if tar -tzf "$blob" 2>/dev/null | grep -qx 'package.yaml'; then
                tar -xzf "$blob" -C _verify package.yaml 2>/dev/null && PKG_YAML="_verify/package.yaml" && break
              fi
              if tar -tf "$blob" 2>/dev/null | grep -qx 'package.yaml'; then
                tar -xf "$blob" -C _verify package.yaml 2>/dev/null && PKG_YAML="_verify/package.yaml" && break
              fi
            done
            if [ -z "$PKG_YAML" ]; then
              echo "::error::[$ARCH] could not locate package.yaml inside the built xpkg"; exit 1
            fi
            PROV=$(grep -c '^kind: Provider$' "$PKG_YAML" || true)
            CRDS=$(grep -c '^kind: CustomResourceDefinition$' "$PKG_YAML" || true)
            echo "[$ARCH] package.yaml: Provider docs=$PROV  CustomResourceDefinition docs=$CRDS"
            if [ "$PROV" -lt 1 ]; then echo "::error::[$ARCH] no Provider meta in package.yaml"; exit 1; fi
            if [ "$CRDS" -ne "$EXPECTED" ]; then
              echo "::error::[$ARCH] expected $EXPECTED CRDs in package.yaml, found $CRDS — packaging is still broken"; exit 1
            fi
            echo "✅ [$ARCH] package.yaml carries the Provider meta + all $CRDS CRDs"

            XPKG_FILES="${XPKG_FILES:+$XPKG_FILES,}${XPKG}"
            echo "::endgroup::"
          done

          echo "XPKG_FILES=${XPKG_FILES}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push multi-platform package index (no runtime-image collision)
        run: |
          REF="ghcr.io/${{ steps.meta.outputs.owner }}/provider-harbor:${{ steps.meta.outputs.version }}"
          # A comma-separated -f list makes crossplane push a single OCI index
          # referencing every per-arch xpkg, so Crossplane selects the matching
          # arch on the node it schedules onto.
          crossplane xpkg push -f "${XPKG_FILES}" "$REF"
          echo "Pushed multi-platform $REF (${XPKG_FILES})"
